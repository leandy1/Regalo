            </div>
            <div id="puntoB" class="punto-luminoso" style="left: 20%; top: 20%;">
                <span class="label-punto">Tú (Canadá)</span>
            </div>

            <!-- Línea SVG con path en coords (0,0) a (100,100) mapeado sobre los div x/y -->
            <svg class="linea-conexion" width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path id="rutaConexion" d="" fill="none" stroke="currentColor" stroke-width="0.5" />
            </svg>
        </div>

        <!-- NARRATIVA -->
        <div class="mensaje-container">
            <p id="textoNarrativo" class="texto-principal"></p>
        </div>

        <!-- CONTADORES -->
        <div class="dashboard-distancia">
            <div class="counter-item">
                <span class="label">Distancia física:</span>
                <span id="distanciaFisica" class="valor">0 km</span>
            </div>
            <div class="counter-item">
                <span class="label">Distancia emocional:</span>
                <span id="distanciaEmocional" class="valor">—</span>
            </div>
            <div id="distanciaFuturaContainer" class="counter-item extra hide">
                <span class="label">Distancia futura:</span>
                <span id="distanciaFutura" class="valor">0 km</span>
            </div>
        </div>

        <!-- CUENTA REGRESIVA -->
        <div id="countdownContainer" class="countdown-container hide">
            <p class="contador-label">Tiempo para volver a vernos:</p>
            <div class="reloj-vibrante">
                <div class="tiempo-unidad">
                    <span id="dias" class="t-val">00</span>
                    <span class="t-lab">Días</span>
                </div>
                <div class="tiempo-unidad">
                    <span id="horas" class="t-val">00</span>
                    <span class="t-lab">Hrs</span>
                </div>
                <div class="tiempo-unidad">
                    <span id="minutos" class="t-val">00</span>
                    <span class="t-lab">Min</span>
                </div>
                <div class="tiempo-unidad">
                    <span id="segundos" class="t-val">00</span>
                    <span class="t-lab">Seg</span>
                </div>
            </div>
        </div>

        <!-- BOTONAERA FINAL -->
        <div id="controlesFinales" class="controles-finales hide">
            <div class="btn-group">
                <a href="../Menu/menu.html" class="btn-regresar">Volver al menú</a>
            </div>
        </div>

    <script src="tiempo.js"></script>

</html>
