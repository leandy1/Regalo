    <script>
        window.onload = async () => {
            const tarjetas = document.querySelectorAll(".tarjeta-regalo");
            const enlaces = document.querySelectorAll(".enlace-regalo");
            const userEmail = localStorage.getItem("userEmail");
            const ADMIN_EMAIL = "leandygabin9@gmail.com";

            // 1. Recuperar estados guardados desde Supabase (POR USUARIO INDIVIDUAL)
            let openedGifts = {};
            try {
                const { data: giftSettings } = await window.supabase
                    .from('app_settings')
                    .select('*')
                    .eq('owner_email', userEmail) // Volvemos a userEmail para que sea individual
                    .like('key', 'regalo_%');

                (giftSettings || []).forEach(s => openedGifts[s.key] = s.value);
            } catch (err) {
                console.error("Error cargando regalos:", err);
            }

            enlaces.forEach((enlace, index) => {
                const idRegalo = enlace.id;
                // Si ya estaba abierto, ocultamos el envoltorio inmediatamente
                if (openedGifts['regalo_' + idRegalo] === 'abierto') {
                    enlace.classList.add("ya-abierto");
                    enlace.classList.add("abierto");
                }

                // Asegurar que siempre se vuelvan visibles
                setTimeout(() => {
                    enlace.classList.add("tarjeta-visible");
                }, index * 100);
            });

            // Las tarjetas se vuelven visibles en el bucle anterior


            // 2. Lógica para abrir regalos (Individual por usuario)
            enlaces.forEach(enlace => {
                enlace.addEventListener("click", async function (e) {
                    if (!this.classList.contains("abierto")) {
                        // PRIMER CLICK: Abrir y guardar para el usuario actual
                        e.preventDefault();
                        this.classList.add("abierto");
                        
                        await window.supabase.from('app_settings').upsert({
                            owner_email: userEmail, // Guardamos para el usuario actual
                            key: 'regalo_' + this.id,
                            value: 'abierto'
                        }, { onConflict: 'owner_email,key' });

                    }
                });
            });

            // 3. GENERAR PÉTALOS
            const contenedor = document.getElementById("contenedorPetalos");
            function crearPetalo() {
                const petalo = document.createElement("div");
                petalo.className = "petalo";
                const size = Math.random() * 15 + 10 + "px";
                petalo.style.width = size;
                petalo.style.height = size;
                petalo.style.left = Math.random() * 100 + "vw";
                petalo.style.top = "-50px";
                petalo.style.opacity = Math.random() * 0.4 + 0.2;
                petalo.style.animationDuration = Math.random() * 10 + 10 + "s";
                petalo.style.transform = `rotate(${Math.random() * 360}deg)`;
                contenedor.appendChild(petalo);
                setTimeout(() => petalo.remove(), 20000);
            }
            setInterval(crearPetalo, 400);
            for (let i = 0; i < 15; i++) crearPetalo(); // Pétalos iniciales

            if (userEmail) {
                cargarDatosPerfil(userEmail);
            }

            async function cargarDatosPerfil(email) {
                const { data: userProfile, error } = await window.supabase
                    .from('profiles')
                    .select('*')
                    .eq('email', email)
                    .single();

                if (userProfile) {
                    const perfilDiv = document.getElementById("perfil-usuario");
                    const userPhoto = document.getElementById("user-photo");
                    const perfilMenu = document.getElementById("perfil-menu");
                    const userEmailDisplay = document.getElementById("user-email-display");
                    const btnOptions = document.getElementById("btn-options");

                    userPhoto.src = userProfile.picture;
                    perfilDiv.style.display = "block";

                    userPhoto.onclick = (e) => {
                        e.stopPropagation();
                        userEmailDisplay.innerText = userProfile.email;
                        const isVisible = perfilMenu.style.display === "block";
                        perfilMenu.style.display = isVisible ? "none" : "block";
                    };

                    document.addEventListener("click", () => perfilMenu.style.display = "none");

                    // Botón de Admin oculto
                    if (btnOptions) btnOptions.style.display = "none";

                    document.getElementById("btn-logout").onclick = () => {
                        localStorage.clear();
                        window.location.href = "../Login/index.html";
                    };

                    // Lógica del botón de calendario mini
                    const btnCal = document.getElementById("btn-calendar-view");
                    if (btnCal) {
                        btnCal.onclick = (e) => {
                            e.stopPropagation();
                            alert("Próximamente: Tu Calendario Personalizado con nuestras fechas especiales. ❤️");
                        };
                    }
                }
            }
        };
    </script>
