<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Solo tú ❤️</title>
  <link rel="stylesheet" href="style.css">
  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="client-supabase.js"></script>
</head>

<body>

  <!-- FONDO ESTELAR ANIMADO Y PARALLAX -->
  <div class="cielo-profundo"></div>
  <div class="capa-estrellas"></div>
  <div class="luciernagas-fondo" id="luciernagasForm"></div>

  <!-- PERFIL DE USUARIO Y MENÚ DESPLEGABLE -->
  <div id="perfil-usuario" class="perfil-container" style="display: none;">
    <div class="calendar-btn-mini" id="btn-calendar-view" title="Calendario Especial">
      <svg class="calendar-svg-icon" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    </div>
    <img id="user-photo" src="" alt="Perfil" class="user-photo">
    
    <div id="perfil-menu" class="perfil-menu" style="display: none;">
      <p id="user-email-display" class="user-email-text"></p>
      <hr class="menu-divider">
      <button id="btn-options" class="btn-menu">Opciones</button>
      <button id="btn-logout" class="btn-menu btn-logout-compact">Cerrar Sesión</button>
    </div>
  </div>

  <!-- CONTENEDOR PORTAL (GLASSMORPHISM) -->
  <div class="contenedor fade-in">

    <!-- BARRA DE PROGRESO NARRATIVA -->
    <div class="barra-progreso">
      <div class="progreso-fill" id="progreso-fill"></div>
    </div>

    <h1 id="titulo" class="titulo-narrativo"></h1>
    <p id="intro" class="texto-narrativo"></p>

    <!-- ÁREA DINÁMICA DE PREGUNTAS -->
    <div id="contenedor-pregunta" class="contenedor-dinamico">
      <!-- Se inyecta por JS -->
    </div>

    <!-- BOTÓN DE ACCIÓN -->
    <button id="btn-responder" style="display: none;">Responder</button>

    <!-- MENSAJE FINAL CINEMÁTICO -->
    <div id="mensaje" style="display: none;"></div>

  </div>

  <script src="index.js"></script>
</body>

</html>
